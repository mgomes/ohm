# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: ohm

before:
  hooks:
    - go mod tidy

builds:
  - id: ohm
    main: ./cmd/ohm
    binary: ohm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/mgomes/ohm/ohmcli.version={{ .Tag }}

archives:
  - id: ohm
    ids:
      - ohm
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - docs/**/*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Tag }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: mgomes
    name: ohm
  name_template: "Ohm {{ .Tag }}"
