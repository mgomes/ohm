name: govulncheck

on:
  schedule:
    - cron: "30 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
